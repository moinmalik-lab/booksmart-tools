<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" rx="25.6" fill="#143d24"/>
  <!-- Grid lines (subtle) -->
  <line x1="42.24" y1="15.36" x2="42.24" y2="112.64" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="84.48" y1="15.36" x2="84.48" y2="112.64" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Book pages (left) -->
  <rect x="15.36" y="28.16" width="44.8" height="71.68" rx="3.84" fill="#0e2818"/>
  <rect x="17.92" y="30.72" width="39.68" height="66.56" rx="3.2" fill="#1c5430"/>
  <!-- Page lines -->
  <line x1="23.04" y1="43.52" x2="52.48" y2="43.52" stroke="rgba(255,255,255,0.4)" stroke-width="2.304" stroke-linecap="round"/>
  <line x1="23.04" y1="53.76" x2="52.48" y2="53.76" stroke="rgba(255,255,255,0.4)" stroke-width="2.304" stroke-linecap="round"/>
  <line x1="23.04" y1="64.0" x2="44.8" y2="64.0" stroke="rgba(255,255,255,0.25)" stroke-width="1.92" stroke-linecap="round"/>
  <!-- Chart bars (right) -->
  <rect x="67.84" y="76.8" width="9.6" height="23.04" rx="1.92" fill="#7dd4a0"/>
  <rect x="78.72" y="61.44" width="9.6" height="38.4" rx="1.92" fill="#7dd4a0"/>
  <rect x="89.6" y="44.8" width="9.6" height="55.04" rx="1.92" fill="#7dd4a0"/>
  <rect x="100.48" y="56.32" width="9.6" height="43.52" rx="1.92" fill="#a8e8c0"/>
  <!-- Trend line over bars -->
  <polyline points="71.04,74.24 81.92,58.88 92.8,42.24 103.68,53.76" 
    fill="none" stroke="#f0c060" stroke-width="2.816" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dollar sign accent -->
  <circle cx="104.32" cy="33.92" r="8.96" fill="#f0c060"/>
  <text x="104.32" y="37.76" text-anchor="middle" fill="#1a1a18" font-size="11.52" font-weight="bold" font-family="Georgia,serif">$</text>
</svg>