  <rect x="71.68" y="122.88" width="158.72" height="266.24" rx="12.8" fill="#1c5430"/>
  <!-- Page lines -->
  <line x1="92.16" y1="174.08" x2="209.92" y2="174.08" stroke="rgba(255,255,255,0.4)" stroke-width="9.216" stroke-linecap="round"/>
  <line x1="92.16" y1="215.04" x2="209.92" y2="215.04" stroke="rgba(255,255,255,0.4)" stroke-width="9.216" stroke-linecap="round"/>
  <line x1="92.16" y1="256.0" x2="179.2" y2="256.0" stroke="rgba(255,255,255,0.25)" stroke-width="7.68" stroke-linecap="round"/>
