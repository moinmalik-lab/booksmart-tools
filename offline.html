<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Offline — BookSmartTools</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#143d24;color:white;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px}
.icon{font-size:72px;margin-bottom:24px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
h1{font-family:'DM Serif Display',serif;font-size:32px;margin-bottom:12px}
p{color:rgba(255,255,255,.65);font-size:15px;line-height:1.7;max-width:380px;margin-bottom:28px}
.btn{background:#7dd4a0;color:#0e2818;padding:14px 32px;border-radius:6px;font-weight:700;font-size:16px;text-decoration:none;display:inline-block;transition:transform .15s}
.btn:hover{transform:translateY(-2px)}
.cached{margin-top:36px;color:rgba(255,255,255,.4);font-size:12px;font-family:'DM Mono',monospace}
</style>
</head>
<body>
<div class="icon">📱</div>
<h1>You're Offline</h1>
<p>No internet connection right now — but don't worry! Most BookSmartTools calculators work offline once you've visited them. Check your connection and try again.</p>
<a href="/booksmart-tools/" class="btn">Try Again →</a>
<p class="cached">Tools you've already visited are saved on your device and work offline.</p>
</body>
</html>
